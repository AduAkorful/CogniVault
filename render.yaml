services:
  - type: web
    name: cognivault-ai-agent
    runtime: docker
    dockerfilePath: ./ai-agent/Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: TEE_PRIVATE_KEY
        sync: false
      - key: VAULT_ADDRESS
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: RELAYER_INTERVAL_MS
        value: "60000"
      - key: RELAYER_MAX_CYCLES
        value: "0"
      - key: MARKET_SIM_INTERVAL_MS
        value: "300000"
