services:
  - type: web
    name: cognivault-ai-agent
    runtime: docker
    dockerfilePath: ./ai-agent/Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: TEE_PRIVATE_KEY
        sync: false
      - key: VAULT_ADDRESS
        sync: false
      - key: DA_VERIFIER_ADDRESS
        value: "0x65D14359B928d46A922F52165D330B000fbd1248"
      - key: DA_DEMO_MODE
        value: "true"
      - key: DA_CLIENT_GRPC
        sync: false
      - key: CORS_ORIGIN
        value: "https://cogni-vault-beta.vercel.app"
      - key: RELAYER_INTERVAL_MS
        value: "60000"
      - key: RELAYER_MAX_CYCLES
        value: "0"
      - key: MARKET_SIM_INTERVAL_MS
        value: "300000"
