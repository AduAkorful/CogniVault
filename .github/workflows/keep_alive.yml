name: Keep Backend Awake

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/14 * * * *' # Run every 14 minutes
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Pinging health endpoint..."
          curl -sL --fail --max-time 10 https://cognivault-ai-agent.onrender.com/health || echo "Ping failed or timed out, but continuing workflow"
