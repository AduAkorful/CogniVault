[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/foundry-upgrades/=node_modules/@openzeppelin/foundry-upgrades/src/"
]

fs_permissions = [
    { access = "read-write", path = "../deployments.json" },
    { access = "read", path = "../" }
]

[profile.script]
via_ir = false
optimizer = true
optimizer_runs = 200
